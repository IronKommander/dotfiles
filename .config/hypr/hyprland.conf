$mainMod = SUPER

$terminal = alacritty
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = XCURSOR_SIZE,24

exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 24
exec-once = mako
exec-once = waybar
exec-once = hyprpaper
exec-once = sleep 2 && ~/.config/hypr/scripts/wallpaperRandomizer.sh
#exec-once = ~/.config/hypr/autostart.sh
exec-once = blueman-applet
exec-once = eval $(gnome-keyring-daemon --start --components=secrets,ssh,gpg)
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = wl-clip-persist --clipboard regular
exec-once = nm-applet --indicator
exec-once = xpad
exec-once = hypridle
exec-once = udiskie
exec-once = easyeffects --gapplication-service
exec-once = swayosd-server

# ------------------------
# Workspace Assignments
# ------------------------

#
#Bindings!
#
bind = $mainMod, D, exec, pkill rofi || rofi -show drun -allow-images
bind = $mainMod SHIFT, F, exec, hyprctl dispatch togglefloating && hyprctl dispatch centerwindow
bind = $mainMod, F, fullscreen

bind = $mainMod,1,workspace,1
bind = $mainMod,2,workspace,2
bind = $mainMod,3,workspace,3
bind = $mainMod,4,workspace,4
bind = $mainMod,5,workspace,5
bind = $mainMod,6,workspace,6
bind = $mainMod,7,workspace,7
bind = $mainMod,8,workspace,8
bind = $mainMod,9,workspace,9
bind = $mainMod,0,workspace,10
# Move focused window to another workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Move active window to a workspace silently mainMod + CTRL [0-9]
bind = $mainMod CTRL, code:10, movetoworkspacesilent, 1 # NOTE: code:10 = key 1
bind = $mainMod CTRL, code:11, movetoworkspacesilent, 2 # NOTE: code:11 = key 2
bind = $mainMod CTRL, code:12, movetoworkspacesilent, 3 # NOTE: code:12 = key 3
bind = $mainMod CTRL, code:13, movetoworkspacesilent, 4 # NOTE: code:13 = key 4
bind = $mainMod CTRL, code:14, movetoworkspacesilent, 5 # NOTE: code:14 = key 5
bind = $mainMod CTRL, code:15, movetoworkspacesilent, 6 # NOTE: code:15 = key 6
bind = $mainMod CTRL, code:16, movetoworkspacesilent, 7 # NOTE: code:16 = key 7
bind = $mainMod CTRL, code:17, movetoworkspacesilent, 8 # NOTE: code:17 = key 8
bind = $mainMod CTRL, code:18, movetoworkspacesilent, 9 # NOTE: code:18 = key 9
bind = $mainMod CTRL, code:19, movetoworkspacesilent, 10 # NOTE: code:19 = key 0

bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise --max-volume 125
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower --max-volume 125
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/mic_toggle.sh

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
# Requires playerctl, music commands
bindl = , XF86AudioNext, exec, playerctl --player=cmus next
bindl = , XF86AudioPause, exec, playerctl --player=cmus play-pause
bindl = , XF86AudioPlay, exec, playerctl --player=cmus play-pause
bindl = , XF86AudioPrev, exec, playerctl --player=cmus previous
bindl = SHIFT, XF86AudioNext, exec, playerctl --player=cmus position 5+
bindl = SHIFT, XF86AudioPrev, exec, playerctl --player=cmus position 5-

binde = $mainMod, t, exec, alacritty
binde = $mainMod SHIFT, Q, killactive 
bind = $mainMod SHIFT, S, exec, grimblast --notify copysave area
binde = $mainMod SHIFT, D, exec, firefox
bind = $mainMod SHIFT, T, exec, .config/hypr/scripts/toggleEffects.sh
binde = $mainMod SHIFT, C, exec, alacritty -e nvim ~/Documents/CompProgVim

# Resize windows
binde = $mainMod SHIFT, H, resizeactive,-25 0
binde = $mainMod SHIFT, L, resizeactive,25 0
binde = $mainMod SHIFT, K, resizeactive,0 -25
binde = $mainMod SHIFT, J, resizeactive,0 25
# Swap windows
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d
# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
# bind = $mainMod, h, movefocus, l
# bind = $mainMod, l, movefocus, r
# bind = $mainMod, k, movefocus, u
# bind = $mainMod, j, movefocus, d
# Workspace switching
bind = $mainMod, tab, workspace, m+1
bind = $mainMod SHIFT, tab, workspace, m-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # NOTE: mouse:272 = left click
bindm = $mainMod, mouse:273, resizewindow # NOTE: mouse:273 = right click
bind = $mainMod, V, exec, pkill rofi || cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, F10, exec, wlogout
bind = $mainMod SHIFT, space, togglefloating
bind = $mainMod, S, exec, echo "" | rofi -dmenu -p "Search gulugulu" | xargs -I{} firefox --private-window "https://www.google.com/search?q={}"
bind = $mainMod, Q, exec, echo "" | rofi -dmenu -p "Search YouTube" | xargs -I{} firefox --private-window "https://www.youtube.com/results?search_query={}"

# # Lock on lid open
# bindl=,switch:on:Lid Switch, exec, hyprlock --immediate
# # Lock lid on close
# bindl=,switch:off:Lid Switch, exec, hyprlock --immediate && systemctl suspend

#wallpaper keybind
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaperRandomizer.sh

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
#monitor=,1920x1200,auto,1.06666667,bitdepth,8
#monitor=,preferred,auto,1.06666667,mirror,eDP-1,bitdepth,8

monitor=eDP-1,preferred,auto,1
monitor=HDMI-A-1,preferred,auto,1
xwayland {
	force_zero_scaling = true
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2.5
    gaps_out = 2.5
    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ff6666ee) 60deg
    col.inactive_border = rgba(5f2f1fff) rgba(226622ee) 45deg

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 3
    rounding_power = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 0.90
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

gesture = 3, horizontal, workspace
# gesture = 3, up, fullscreen
	
# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

device {
   name = gxtp5100:00-27c6:01e0-touchpad
   sensitivity = 0.3
}
input {
    touchpad {
        disable_while_typing = false
    }
}   
